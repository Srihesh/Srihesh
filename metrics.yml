name: Metrics

on:
  schedule:
    - cron: "0 2 * * *"   # Runs daily at 2AM UTC — update once per day max
  workflow_dispatch:       # Manual trigger from the Actions tab

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # Needed to commit generated SVGs back to the repo

    steps:

      # ─── CARD 1: Core Stats ──────────────────────────────────────────────────
      - name: Core stats
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.core.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Srihesh
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          plugin_lines: yes
          plugin_traffic: yes

      # ─── CARD 2: Languages ──────────────────────────────────────────────────
      - name: Languages breakdown
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.langs.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Srihesh
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: >-
            html, css, tex, less, dockerfile, makefile,
            qmake, lex, cmake, gnuplot
          plugin_languages_details: bytes-size, percentage
          plugin_languages_sections: most-used
          plugin_languages_limit: 8
          config_timezone: Asia/Kolkata

      # ─── CARD 3: Contribution Calendar (Isometric) ──────────────────────────
      - name: Isometric calendar
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.isocalendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Srihesh-Kothapalli
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: Asia/Kolkata

      # ─── CARD 4: Achievements ────────────────────────────────────────────────
      - name: Achievements
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.achievements.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Srihesh-Kothapalli
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes
          config_timezone: Asia/Kolkata
